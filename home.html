<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Trámite Documentario - Panel de Administración del Hospital.">
  <meta name="theme-color" content="#0284C7">
  <title>Panel — Sistema SIS</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/home.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/usuarios.css">
  <link rel="stylesheet" href="assets/css/tramites.css">
  <link rel="stylesheet" href="assets/css/documentos.css">

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- Overlay para sidebar en móvil -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Cabecera -->
      <div class="sidebar-cabecera">
        <img src="assets/img/Logo.jpg" alt="Logo Hospital" class="sidebar-logo">
        <div class="sidebar-info">
          <div class="sidebar-titulo">SISTEMA SIS</div>
          <div class="sidebar-subtitulo">Trámite Documentario</div>
        </div>
      </div>

      <!-- Divisor -->
      <div class="sidebar-divisor"></div>

      <!-- Navegación -->
      <nav class="sidebar-nav">
        <ul class="sidebar-menu">
          <li class="sidebar-item activo" data-seccion="dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Dashboard
          </li>
          <li class="sidebar-item" data-seccion="usuarios" data-rol="administrador">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Usuarios
          </li>
          <li class="sidebar-item" data-seccion="registrar-tramite">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            Registrar Trámite
          </li>
          <li class="sidebar-item" data-seccion="documentos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            Documentos
          </li>
        </ul>
      </nav>

      <!-- Pie -->
      <div class="sidebar-pie">
        <button class="sidebar-cerrar-sesion" id="btn-cerrar-sesion">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- Contenido principal -->
    <main class="contenido-principal">
      <!-- Header -->
      <header class="contenido-header">
        <div class="contenido-header-izq">
          <button class="btn-menu-movil" id="btn-menu-movil" aria-label="Abrir menú">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="contenido-titulo-pagina" id="titulo-pagina">Dashboard</h1>
        </div>
        <div class="contenido-usuario-info" id="usuario-info">
          <span id="usuario-nombre"></span>
          <div class="contenido-usuario-avatar" id="usuario-avatar"></div>
        </div>
      </header>

      <!-- Área de contenido dinámico -->
      <div class="contenido-area" id="contenido-area">
        <div style="display:flex;align-items:center;justify-content:center;padding:60px;">
          <div class="spinner primario"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal de Cerrar Sesión (Estilo Premium y Glassmorphism) -->
  <div class="modal-overlay" id="modal-confirm-logout">
    <div class="modal-card" style="max-width: 400px; width: 90%; border-radius: 16px; background: white; overflow: hidden; box-shadow: var(--sombra-xl); text-align: center; padding: 30px 20px; animation: modalFadeIn 0.3s ease;">
      <h3 style="margin: 0 0 10px 0; font-size: 1.15rem; color: #0F172A; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">ESTAS APUNTO DE CERRAR SESIÓN</h3>
      <p style="margin: 0 0 25px 0; font-size: 0.85rem; color: #64748B; line-height: 1.5;">¿Está seguro de que desea salir del sistema?</p>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button class="btn-secundario" id="btn-logout-cancelar" style="margin: 0; padding: 10px 24px; font-weight: 600; min-width: 120px; font-size: 0.85rem; background: transparent; border: 1px solid var(--color-primario); color: var(--color-primario); border-radius: 8px;">Cancelar</button>
        <button class="btn-primario" id="btn-logout-confirmar" style="margin: 0; padding: 10px 24px; font-weight: 600; min-width: 120px; font-size: 0.85rem; background: var(--color-primario); border-color: var(--color-primario); color: white; border-radius: 8px;">Cerrar Sesión</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <!-- Librerías Externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="assets/js/dashboard.js"></script>
  <script src="assets/js/usuarios.js"></script>
  <script src="assets/js/tramites.js"></script>
  <script src="assets/js/documentos.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
