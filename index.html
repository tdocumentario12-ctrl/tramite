<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Trámite Documentario - Hospital. Inicie sesión para gestionar documentos.">
  <meta name="theme-color" content="#0284C7">
  <title>Iniciar Sesión — Sistema SIS</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/login.css">

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="login-pagina">
    <div class="login-card-moderno">
      
      <!-- LADO IZQUIERDO: FORMULARIO -->
      <div class="login-seccion-form">
        <div class="login-header-form">
          <div class="login-logo-contenedor">
            <img src="assets/img/Logo.jpg" alt="Logo del Hospital" class="login-logo" id="login-logo">
          </div>
          <h1 class="login-titulo">SISTEMA SIS</h1>
        </div>

        <!-- Error general -->
        <div class="login-error-general" id="login-error-general">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="login-error-texto">Error</span>
        </div>

        <!-- Formulario -->
        <form id="login-form" class="login-formulario" autocomplete="off" novalidate>
          <div class="campo-grupo">
            <label class="campo-label" for="login-usuario">Nombre de usuario</label>
            <div class="campo-input-wrapper">
              <svg class="campo-icono" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" class="campo-input" id="login-usuario" placeholder="Usuario" required>
            </div>
            <span class="campo-error" id="login-error-usuario">Ingrese su usuario</span>
          </div>

          <div class="campo-grupo">
            <label class="campo-label" for="login-password">Contraseña</label>
            <div class="campo-input-wrapper">
              <svg class="campo-icono" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" class="campo-input" id="login-password" placeholder="••••••••" required>
              <button type="button" class="campo-toggle-password" id="toggle-password">
                <svg id="icono-ojo-abierto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="icono-ojo-cerrado" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <span class="campo-error" id="login-error-password">Ingrese su contraseña</span>
          </div>

          <div class="login-opciones">
            <label class="recordarme">
              <input type="checkbox" id="login-recordarme">
              <span>Recordarme</span>
            </label>
            <span class="olvide-password" id="olvide-password">¿Olvidaste tu contraseña?</span>
          </div>

          <button type="submit" class="btn-login" id="btn-login">
            <span id="btn-login-texto">Iniciar sesión</span>
            <div class="spinner" id="btn-login-spinner" style="display:none;"></div>
          </button>
        </form>
      </div>

      <!-- LADO DERECHO: PANEL VISUAL AZUL-->
      <div class="login-seccion-visual">
        <div class="visual-blobs">
          <div class="blob blob-1"></div>
          <div class="blob blob-2"></div>
        </div>
        <div class="visual-contenido">
          <h2 class="visual-titulo">¡Bienvenido!</h2>
          <p class="visual-texto">Ingrese sus datos personales para usar todas las funciones del trámite documentario</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Inicializar UI y utilidades (Síncrono primero)
      try {
        Conexion.inicializar();
        Toast.inicializar();
        console.log('[SIS] UI Inicializada');
      } catch (e) {
        console.error('[SIS] Error al inicializar utilidades:', e);
      }

      // 2. Vincular eventos de UI inmediatamente (Evita que el formulario haga GET)
      const form = document.getElementById('login-form');
      const toggleBtn = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('login-password');
      const ojoAbierto = document.getElementById('icono-ojo-abierto');
      const ojoCerrado = document.getElementById('icono-ojo-cerrado');

      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const esPassword = passwordInput.type === 'password';
          passwordInput.type = esPassword ? 'text' : 'password';
          ojoAbierto.style.display = esPassword ? 'none' : 'block';
          ojoCerrado.style.display = esPassword ? 'block' : 'none';
        });
      }

      document.getElementById('olvide-password')?.addEventListener('click', () => {
        Toast.info('Función no disponible. Contacte al administrador.');
      });

      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          console.log('[SIS] Intento de login...');

          const usuario = document.getElementById('login-usuario').value.trim();
          const password = document.getElementById('login-password').value;
          const recordarme = document.getElementById('login-recordarme').checked;

          let valido = true;
          if (!usuario) {
            document.getElementById('login-usuario').classList.add('error');
            document.getElementById('login-error-usuario').classList.add('visible');
            valido = false;
          }
          if (!password) {
            document.getElementById('login-password').classList.add('error');
            document.getElementById('login-error-password').classList.add('visible');
            valido = false;
          }

          if (!valido) return;

          document.getElementById('login-error-general').classList.remove('visible');
          const btn = document.getElementById('btn-login');
          const texto = document.getElementById('btn-login-texto');
          const spinner = document.getElementById('btn-login-spinner');

          btn.disabled = true;
          texto.style.display = 'none';
          spinner.style.display = 'block';

          try {
            await Auth.iniciarSesion(usuario, password, recordarme);
            console.log('[SIS] Login exitoso, redireccionando...');
            window.location.href = 'home.html';
          } catch (err) {
            console.error('[SIS] Error en login:', err);
            document.getElementById('login-error-texto').textContent = err.message;
            document.getElementById('login-error-general').classList.add('visible');
            btn.disabled = false;
            texto.style.display = 'inline';
            spinner.style.display = 'none';
          }
        });
      }

      // Limpiar errores al escribir
      ['login-usuario', 'login-password'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', (e) => {
          e.target.classList.remove('error');
          document.getElementById(`login-error-${id.split('-')[1]}`)?.classList.remove('visible');
          document.getElementById('login-error-general').classList.remove('visible');
        });
      });

      // 3. Acciones asíncronas (Verificar sesión y rellenar campos)
      const usuarioRecordado = Auth.obtenerUsuarioRecordado();
      if (usuarioRecordado) {
        document.getElementById('login-usuario').value = usuarioRecordado;
        document.getElementById('login-recordarme').checked = true;
      }

      try {
        console.log('[SIS] Verificando sesión...');
        const session = await Auth.obtenerSesion();
        if (session) {
          console.log('[SIS] Sesión activa encontrada');
          window.location.href = 'home.html';
        }
      } catch (e) {
        console.warn('[SIS] Error al verificar sesión:', e);
      }
    });
  </script>
</body>
</html>
